<div class="home">
  <div class="home__card">
    <h1 class="home__title">BAUKLANK Studio</h1>
    <p class="home__subtitle">Fixture control &amp; monitoring</p>
    <div class="home__divider"></div>
    <p class="home__message">Sign in to access the studio.</p>
    @if (authService.authEndpointError()) {
      <p class="home__error home__error--endpoint">{{ authService.authEndpointError() }}</p>
    }

    @if (authService.authMode() === 'lwl') {
      <div class="home__form">
        <label class="home__label" for="lwl-username">Username</label>
        <input
          id="lwl-username"
          class="home__input"
          [ngModel]="username()"
          (ngModelChange)="username.set($event)"
          autocomplete="username"
        />
        <label class="home__label" for="lwl-password">Password</label>
        <div class="home__password-wrap">
          <input
            id="lwl-password"
            class="home__input home__input--password"
            [type]="showPassword() ? 'text' : 'password'"
            [ngModel]="password()"
            (ngModelChange)="password.set($event)"
            autocomplete="current-password"
          />
          <button
            class="home__password-toggle"
            type="button"
            (click)="togglePasswordVisibility()"
            [attr.aria-label]="showPassword() ? 'Hide password' : 'Show password'"
            [title]="showPassword() ? 'Hide password' : 'Show password'"
          >
            <i [class]="showPassword() ? 'pi pi-eye-slash' : 'pi pi-eye'"></i>
          </button>
        </div>
      </div>
      @if (loginError()) {
        <p class="home__error">{{ loginError() }}</p>
      }
      <button class="home__login-btn" type="button" [disabled]="isSubmitting()" (click)="onLoginClick()">
        <i class="pi pi-sign-in"></i>
        {{ isSubmitting() ? 'Signing in...' : 'Sign in (LWL)' }}
      </button>
    } @else {
      <button class="home__login-btn" type="button" (click)="onLoginClick()">
        <i class="pi pi-sign-in"></i>
        Sign in
      </button>
    }
  </div>
</div>
