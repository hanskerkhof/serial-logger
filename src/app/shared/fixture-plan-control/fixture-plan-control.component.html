@if (displayedState() || planControls()?.trigger?.available || planControls()?.stop?.available) {
  <div class="fixture-plan-control">
    @if (displayedState(); as state) {
      <span [class]="badgeClass()">
        <i [class]="querying() ? 'fixture-plan-control__badge-icon pi pi-spinner pi-spin' : 'fixture-plan-control__badge-icon pi pi-circle'"></i>
        {{ state }}
      </span>
    }
    @if (planControls()?.trigger?.available) {
      <button
        pButton
        type="button"
        label="Plan trigger"
        severity="secondary"
        size="small"
        [loading]="loading()"
        [disabled]="loading() || disabled()"
        (click)="onTrigger()"
      ></button>
    }
    @if (planControls()?.stop?.available) {
      <button
        pButton
        type="button"
        label="Plan stop"
        severity="secondary"
        size="small"
        [loading]="loading()"
        [disabled]="loading() || disabled()"
        (click)="onStop()"
      ></button>
    }
  </div>
}
