@if (player(); as p) {
  @if (p.attached) {
    <section class="fixture-player-controls">
      <span class="fixture-player-controls__label">Player</span>
      <span>play track: {{ p.play_track_available ? 'yes' : 'no' }}</span>
      <span>volume control: {{ p.volume_control_available ? 'yes' : 'no' }}</span>
      <span>Analog volume: {{ p.analog_volume_active ? 'yes' : 'no' }}</span>
    </section>
  } @else {
    <section class="fixture-player-controls">
      <span class="fixture-player-controls__label">Player</span>
      <span>No player attached</span>
    </section>
  }
}
