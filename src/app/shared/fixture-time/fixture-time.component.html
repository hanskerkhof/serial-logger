<span class="fixture-time">
  <button
    pButton
    type="button"
    icon="pi pi-clock"
    [text]="true"
    [rounded]="true"
    severity="secondary"
    size="small"
    title="Sync fixture time from browser"
    [disabled]="disabled()"
    (click)="syncRequested.emit()"
  ></button>
  @if (selectedFixtureTime(); as t) {
    <span class="fixture-time__label" [class.fixture-time__label--unset]="!t.synced">{{ t.label }}</span>
  }
  <label class="fixture-time__auto">
    <p-toggleswitch
      size="small"
      [ngModel]="autoEnabled()"
      [disabled]="disabled()"
      (ngModelChange)="onAutoChange($event)"
    />
    <span class="fixture-time__auto-label">auto sync</span>
  </label>
</span>
